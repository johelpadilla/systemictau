apiVersion: apps/v1
kind: Deployment
metadata:
  name: systemictau-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: systemictau-redis
  template:
    metadata:
      labels:
        app: systemictau-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: systemictau-redis
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: systemictau-redis
