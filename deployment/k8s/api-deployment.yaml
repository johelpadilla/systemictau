apiVersion: apps/v1
kind: Deployment
metadata:
  name: systemictau-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: systemictau-api
  template:
    metadata:
      labels:
        app: systemictau-api
    spec:
      containers:
      - name: api
        image: systemictau:v4.0
        ports:
        - containerPort: 8000
        env:
        - name: CELERY_BROKER_URL
          value: "redis://systemictau-redis:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: systemictau-api-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: systemictau-api
