version: '3.8'

services:
  api:
    build: .
    container_name: systemictau-api
    ports:
      - "8000:8000"
    command: uvicorn systemictau.platform.api.main:app --host 0.0.0.0 --port 8000
    environment:
      - ENV=production
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  dashboard:
    build: .
    container_name: systemictau-dashboard
    ports:
      - "8501:8501"
    command: streamlit run src/systemictau/platform/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000

  redis:
    image: redis:alpine
    container_name: systemictau-redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: systemictau-worker
    command: celery -A systemictau.platform.api.worker.celery_app worker --loglevel=info
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: systemictau-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: systemictau-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  neo4j:
    image: neo4j:latest
    container_name: systemictau-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password

  stream_processor:
    build: .
    container_name: systemictau-stream-processor
    command: faust -A systemictau.streaming.app worker -l info
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER_URL: kafka://kafka:9092

  agent_observer:
    build: .
    container_name: systemictau-agent-observer
    command: faust -A systemictau.agents.observer worker -l info
    depends_on:
      - kafka
      - neo4j
    environment:
      KAFKA_BROKER_URL: kafka://kafka:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password

  prometheus:
    image: prom/prometheus:latest
    container_name: systemictau-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: systemictau-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
